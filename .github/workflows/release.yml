name: Release


on:
  workflow_dispatch:

permissions:
  contents: read


jobs:
  artifacts:
    name: Create Artifacts
    permissions:
      contents: read
    runs-on: ubuntu-latest
    strategy:
      matrix:
        language: ['english', 'french', 'portuguese']

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Compile LaTeX for ${{ matrix.language }}
        uses: xu-cheng/latex-action@6549dc21effb2730855a1281407ecfcececc6c1b #v4.1.0
        with:
          pre_compile: |
            sed -i 's/\\selectlanguage{.*}/\\selectlanguage{${{matrix.language}}}/' main.tex
          root_file: 'main.tex'
          working_directory: 'src/'
          post_compile: |
            mv main.pdf cv-${{matrix.language}}.pdf

      - name: Upload ${{ matrix.language }} CV as PDF file
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: cv-${{ matrix.language }}
          path: 'src/cv-${{matrix.language}}.pdf'


  releaser:
    name: Create Release
    needs:
      - artifacts
    permissions:
      contents: write
      issues: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Download All Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c #v8.0.1
        with:
          path: src/
          pattern: cv-*
          merge-multiple: true

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f #v6.3.0
        with:
          node-version: "lts/*" # latest

      - name: Install Dependencies
        run: npm clean-install

      - name: Verify Dependencies Integrity
        run: npm audit signatures

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
