name: LaTeX Build


on:
  pull_request:
    branches: [ "master" ]
    paths:
      - '**.tex'


jobs:
  LaTeX:
    name: Compile LaTeX File
    permissions:
      contents: read
    runs-on: ubuntu-latest
    strategy:
      matrix:
        language: ['english', 'french', 'portuguese']

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0

      - name: Compile LaTeX for ${{ matrix.language }}
        uses: xu-cheng/latex-action@6549dc21effb2730855a1281407ecfcececc6c1b #v4.1.0
        with:
          pre_compile: |
            sed -i 's/\\selectlanguage{.*}/\\selectlanguage{${{matrix.language}}}/' main.tex
          root_file: 'main.tex'
          working_directory: 'src/'
          post_compile: |
            mv main.pdf cv-${{matrix.language}}.pdf

      - name: Upload ${{ matrix.language }} CV as PDF file
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: cv-${{ matrix.language }}
          path: 'src/cv-${{matrix.language}}.pdf'